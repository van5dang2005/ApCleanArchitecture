services:
  apidemo:
    image: ${DOCKER_REGISTRY-}apidemo
    build:
      context: .
      dockerfile: ApiDemo/Dockerfile
    ports:
      - "5213:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Server=db;Initial Catalog=ApiDemo;User Id=sa;Password=Admin123456@;Encrypt=True;Trust Server Certificate=True;Connection Timeout=30;
      - Jwt__Secret=your-super-secret-key-min-32-characters!!
      - Jwt__Issuer=MyApp
      - Jwt__Audience=MyApp
      - RabbitMq__HostName=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__UserName=guest
      - RabbitMq__Password=guest
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Admin123456@
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Admin123456@ -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - sqldata:/var/opt/mssql
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"    # AMQP - app dùng port này để publish/consume
      - "15672:15672"  # Management UI - http://localhost:15672 (guest/guest)
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  sqldata:
  rabbitmq_data: